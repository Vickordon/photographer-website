version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: photographer_db
    environment:
      POSTGRES_USER: photographer
      POSTGRES_PASSWORD: photographer_pass
      POSTGRES_DB: photographer_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5454:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photographer"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - photographer_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: photographer_app
    env_file:
      - .env
    environment:
      MIX_ENV: prod
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DATABASE_URL: postgresql://photographer:photographer_pass@db:5432/photographer_prod
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - photographer_network
    # Run migrations then start the server
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /app/bin/photographer eval "Photographer.Release.migrate()" &&
        /app/bin/photographer start
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  photographer_network:
    driver: bridge
