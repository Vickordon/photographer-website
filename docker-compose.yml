version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: photographer_db
    environment:
      POSTGRES_USER: photographer
      POSTGRES_PASSWORD: photographer_pass
      POSTGRES_DB: photographer_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5454:5432"  # Using port 5454 to avoid conflicts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photographer"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - photographer_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: photographer_app
    environment:
      MIX_ENV: prod
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DATABASE_URL: postgresql://photographer:photographer_pass@db:5432/photographer_prod
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - photographer_network
    command: >
      sh -c "./bin/migrate &&
             ./bin/server"

volumes:
  postgres_data:

networks:
  photographer_network:
    driver: bridge
